name: Update GitHub Profile

on:
  workflow_dispatch:
  schedule:
    # Run at 8 AM and 8 PM daily
    - cron: '0 0,12 * * *'

jobs:
  update-snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Contribution Snake SVG
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: Neon1204
          github_api_token: ${{ secrets.GH_TOKEN }}

      - name: Push Snake SVG
        run: |
          mkdir -p output
          cp ${{ steps.snake.outputs.path }} output/github-contribution-grid-snake.svg
          cp ${{ steps.snake.outputs.path_dark }} output/github-contribution-grid-snake-dark.svg || true
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "🐍 Update contribution snake $(date +'%Y-%m-%d')"
          git push origin main
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
