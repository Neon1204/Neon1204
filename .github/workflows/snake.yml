name: Generate Contribution Snake

on:
  workflow_dispatch:
  schedule:
    # Run every day at midnight
    - cron: '0 0 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Generate Github Contribution Snake
        uses: mikhail-berlinkov/github-contributions-grid-snake@2.2.1
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          commit_emoji: 'snake'
          grid_emoji: '⬜'

      - name: Push Snake SVG
        run: |
          mkdir -p output
          cp github-snake.svg output/github-contribution-grid-snake.svg || true
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "🐍 Update contribution snake $(date +'%Y-%m-%d')"
          git push origin main
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
