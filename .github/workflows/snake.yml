name: Generate Contribution Snake

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Contribution Snake
        uses: janlikar/github-contributions-svg@v1.2.2
        with:
          username: ${{ secrets.GH_USR }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Push Snake SVG
        run: |
          mkdir -p output
          ls -la
          cp github-contribution-grid-snake.svg output/github-contribution-grid-snake.svg 2>/dev/null || \
          cp github-snake.svg output/github-contribution-grid-snake.svg 2>/dev/null || \
          cp contributions.svg output/github-contribution-grid-snake.svg 2>/dev/null || \
          echo "No SVG found"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "🐍 Update contribution snake $(date +'%Y-%m-%d')"
          git push origin main
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
